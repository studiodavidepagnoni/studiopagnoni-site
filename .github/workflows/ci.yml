name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Static export build
        env:
          STATIC_EXPORT: "1"
          SKIP_VIDEO: "1"
          NEXT_PUBLIC_SITE_URL: https://www.studiotecnicopagnoni.it
        run: npm run build:static
