name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Static export build
        env:
          STATIC_EXPORT: "1"
          SKIP_VIDEO: "1"
          NEXT_PUBLIC_SITE_URL: https://www.studiotecnicopagnoni.it
          NEXT_PUBLIC_FORMSPREE_ID: e2e-ci-mock
        run: npm run build:static

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Lighthouse (soglie LCP / CLS)
        env:
          LH_MAX_LCP_MS: "4500"
          LH_MAX_CLS: "0.15"
        # Il runner può esporre CHROME_PATH=/usr/bin/google-chrome (non compatibile con Lighthouse).
        run: env -u CHROME_PATH -u CHROME_BIN npm run lighthouse:ci

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-ci
          path: .lighthouse/ci-mobile.report.json
          if-no-files-found: ignore
