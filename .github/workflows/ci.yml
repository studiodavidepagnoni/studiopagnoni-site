name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Static export build
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_SITE_URL: https://studiopagnoni.com
          NEXT_PUBLIC_FORMSPREE_ID: e2e-ci-mock
        # Asset già ottimizzati in repo: sync + export, senza ricodifica ffmpeg/sharp in CI.
        run: npm run build:static:fast

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests (home, contatti, progetti, SLAM)
        run: npm run test:e2e

      - name: Install Chrome for Lighthouse
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Lighthouse mobile (LCP / CLS)
        env:
          LH_CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          LH_MAX_LCP_MS: "4500"
          LH_MAX_CLS: "0.15"
        run: env -u CHROME_PATH -u CHROME_BIN npm run lighthouse:ci

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-ci
          path: .lighthouse/ci-mobile.report.json
          if-no-files-found: ignore
